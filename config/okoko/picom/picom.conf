# ─── Render Backend & Performance (OpenGL / GLX) ──────────────────────────────
# GPU Hardware Acceleration via OpenGL
backend = "glx";
vsync = false;
use-damage = true;

# GLX Specific Optimizations
glx-no-stencil = true;
glx-no-rebind-pixmap = true;

# ─── Corner Radius ────────────────────────────────────────────────────────────
corner-radius = 6;

rounded-corners-exclude = [
  "window_type = 'dock'",
  "window_type = 'desktop'",
  "class_g = 'Polybar'",
  "class_g = 'i3-frame'"
];

# ─── Shadows ──────────────────────────────────────────────────────────────────
shadow = false;
shadow-radius = 10;
shadow-offset-x = -10;
shadow-offset-y = -10;
shadow-opacity = 0.6;

shadow-exclude = [
  "name = 'Notification'",
  "class_g = 'Polybar'",
  "class_g = 'Rofi'",
  "class_g = 'flameshot'",
  "window_type = 'dock'",
  "window_type = 'desktop'",
  "_GTK_FRAME_EXTENTS@:c"
];

# ─── Fading (Transitions) ─────────────────────────────────────────────────────
fading = true;
fade-delta = 4;
fade-in-step = 0.03;
fade-out-step = 0.03;

# ─── Opacity & Dimming ────────────────────────────────────────────────────────
active-opacity = 1.0;
inactive-opacity = 0.90;
frame-opacity = 1.0;
inactive-opacity-override = false;

# Exclude core UI elements from unfocused dimming/opacity rules
focus-exclude = [
  "class_g = 'Polybar'",
  "class_g = 'Rofi'",
  "class_g = 'feh'",
  "class_g = 'flameshot'",
  "window_type = 'dock'",
  "window_type = 'desktop'"
];

# Targeted window opacity rules (Format: "Opacity:Condition")
opacity-rule = [
  "95:class_g = 'Alacritty' && focused",
  "80:class_g = 'Alacritty' && !focused",
  "90:class_g = 'term_float'",
  "95:class_g = 'Rofi'",
  "90:class_g = 'Code'",
  "100:class_g = 'Sublime_text'",
  "100:class_g = 'Polybar'"
];

# ─── Window Types Specifics ───────────────────────────────────────────────────
wintypes:
{
  tooltip       = { fade = true; shadow = false; opacity = 0.85; focus = true; };
  dock          = { shadow = false; clip-shadow-above = true; opacity = 1.0; };
  dnd           = { shadow = false; };
  popup_menu    = { opacity = 0.95; };
  dropdown_menu = { opacity = 0.95; };
};

# ─── Global WM Integration ────────────────────────────────────────────────────
mark-wmwin-focused = true;
mark-ovredir-focused = true;
detect-rounded-corners = true;
detect-client-opacity = true;
detect-transient = true;
