[colors]
background = #991E1E2E
background-alt = #00000000
foreground = #C5C8C6
primary = #F0C674
secondary = #8ABEB7
alert = #A54242
disabled = #707880

[bar/top]
width = 100%
height = 18pt
radius = 5

font-0 = "RobotoMono Nerd Font:style=Regular:size=10;5"
font-1 = "Font Awesome 6 Free Solid:size=10;5"

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 3pt
border-size = 4pt
border-color = #00000000

padding-left = 1
padding-right = 2

module-margin = 1

modules-left = os-icon xworkspaces
modules-center = xwindow
; Ordre reorganise : Materiel -> Stockage -> VPN -> Horloge
modules-right = cpu memory filesystem eth date

cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true

[module/os-icon]
type = custom/text
content = "  "
content-foreground = ${colors.primary}
click-left = alacritty --class term_float -e sh -c "fastfetch; exec $SHELL"

[module/xworkspaces]
type = internal/xworkspaces

label-active = %name%
label-active-background = ${colors.background-alt}
label-active-underline = ${colors.primary}
label-active-padding = 1

label-occupied = %name%
label-occupied-padding = 1

label-urgent = %name%
label-urgent-background = ${colors.alert}
label-urgent-padding = 1

label-empty = %name%
label-empty-foreground = ${colors.disabled}
label-empty-padding = 1

[module/xwindow]
type = internal/xwindow

label = %class%
label-maxlen = 30
label-empty = Desktop
label-empty-foreground = ${colors.disabled}


[module/cpu]
type = internal/cpu
interval = 2
format-prefix = " "
format-prefix-foreground = ${colors.primary}
label = %percentage:2%%

[module/memory]
type = internal/memory
interval = 2
format-prefix = " "
format-prefix-font = 2
format-prefix-foreground = ${colors.primary}
label = %percentage_used:2%%

[module/filesystem]
type = internal/fs
interval = 10000
mount-0 = /
format-mounted-prefix = " "
format-mounted-prefix-foreground = ${colors.primary}
label-mounted = %percentage_used%%
label-unmounted = %mountpoint% N/A
label-unmounted-foreground = ${colors.disabled}

[module/eth]
type = internal/network
interface = tun0
interval = 120

format-connected-prefix = "󰌘 "
format-connected-prefix-foreground = ${colors.secondary}
label-connected = %local_ip%
label-connected-foreground = ${colors.foreground}

format-disconnected = <label-disconnected>
label-disconnected = "󰌆 OFF"
label-disconnected-foreground = ${colors.disabled}

[module/date]
type = internal/date
interval = 1

date = %H:%M
date-alt = %Y-%m-%d %H:%M:%S

format-prefix = " "
format-prefix-foreground = ${colors.primary}
label = %date%
label-foreground = ${colors.foreground}

[settings]
screenchange-reload = true
pseudo-transparency = true

; vim:ft=dosini
